<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300" role="img" aria-label="/goal — a Claude Code plugin for persistent, audit-gated objectives">
  <!-- Background: pure white. -->
  <rect width="1600" height="300" fill="#ffffff"/>

  <!-- Wordmark "/goal": single centered text. Slash a hair lighter in weight
       so the name "goal" stays dominant; the slash reads as the syntactic
       prefix. -->
  <text x="800" y="140" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="100" letter-spacing="-0.04em" fill="#18181b">
    <tspan font-weight="700">/</tspan><tspan font-weight="800">goal</tspan>
  </text>

  <!-- Hand-drawn underline sits below the "goal" portion only, echoing the
       title underlines in the architecture/lifecycle diagrams. -->
  <path d="M 720 180 Q 815 175 910 180"
        stroke="#18181b" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="800" y="218" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="500" letter-spacing="-0.005em" fill="#71717a">
    A Claude Code plugin for persistent, audit-gated objectives
  </text>
</svg>
